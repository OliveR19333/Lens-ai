<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LENS AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
  :root {
    --black: #080808; --dark: #111; --panel: #161616; --border: #252525;
    --accent: #FF4D00; --accent2: #FFB800; --text: #E8E8E8; --muted: #666; --green: #00CC66;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--black); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--black); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 6px; color: var(--accent); }
  .logo span { color: var(--text); }
  .version { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .api-bar { background: #0d0800; border-bottom: 1px solid #2a1a00; padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .api-bar label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); white-space: nowrap; }
  .api-bar input { flex: 1; background: #111; border: 1px solid #2a1a00; color: var(--text); padding: 8px 10px; font-family: 'DM Mono', monospace; font-size: 12px; outline: none; border-radius: 2px; min-width: 0; }
  .api-bar input:focus { border-color: var(--accent2); }
  .save-btn { background: var(--accent2); color: #000; border: none; padding: 8px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 2px; white-space: nowrap; }
  .content { padding: 16px; max-width: 500px; margin: 0 auto; }
  .section-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .camera-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
  .cam-tab { background: var(--dark); border: 1px solid var(--border); color: var(--muted); padding: 12px 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-align: center; border-radius: 2px; }
  .cam-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .log-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
  .log-pill { background: var(--dark); border: 1px solid var(--border); color: var(--muted); padding: 10px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; text-align: center; border-radius: 2px; }
  .log-pill.active { background: #1a1400; border-color: var(--accent2); color: var(--accent2); }
  .intent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
  .intent-chip { background: var(--dark); border: 1px solid var(--border); color: var(--muted); padding: 10px; font-size: 11px; letter-spacing: 1px; cursor: pointer; text-align: center; font-family: 'DM Mono', monospace; border-radius: 2px; }
  .intent-chip.active { background: #0a1a0a; border-color: var(--green); color: var(--green); }
  .upload-zone { border: 2px dashed var(--border); border-radius: 4px; padding: 32px 20px; text-align: center; cursor: pointer; margin-bottom: 16px; position: relative; background: var(--dark); }
  .upload-zone.has-image { border-color: var(--accent); padding: 0; overflow: hidden; }
  #previewImg { width: 100%; max-height: 280px; object-fit: cover; display: none; border-radius: 2px; }
  .upload-zone.has-image #previewImg { display: block; }
  .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .upload-zone.has-image .upload-placeholder { display: none; }
  .upload-icon { font-size: 44px; opacity: 0.3; }
  .upload-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .upload-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .retake-btn { display: none; width: 100%; background: #1a1a1a; border: 1px solid var(--border); color: var(--muted); padding: 10px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; text-align: center; margin-bottom: 16px; }
  .retake-btn.visible { display: block; }
  .analyze-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin-bottom: 20px; }
  .analyze-btn:active { background: #cc3d00; }
  .analyze-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .loading-bar { width: 100%; height: 3px; background: var(--border); overflow: hidden; margin-bottom: 20px; display: none; border-radius: 2px; }
  .loading-bar.visible { display: block; }
  .loading-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: loading 1.5s ease-in-out infinite; width: 40%; }
  @keyframes loading { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .results { display: none; }
  .results.visible { display: block; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .result-card { background: var(--dark); border: 1px solid var(--border); padding: 14px 12px; border-radius: 2px; animation: slideUp 0.3s ease forwards; opacity: 0; }
  .result-card.full { grid-column: 1 / -1; }
  .result-key { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .result-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent2); line-height: 1; }
  .result-val.hot { color: var(--accent); }
  .scene-box { background: var(--dark); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 14px; margin-bottom: 10px; border-radius: 2px; animation: slideUp 0.4s ease forwards; opacity: 0; }
  .scene-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .scene-text { font-size: 12px; line-height: 1.7; color: #aaa; }
  .tips-box { background: var(--dark); border: 1px solid var(--border); border-left: 3px solid var(--green); padding: 14px; margin-bottom: 24px; border-radius: 2px; animation: slideUp 0.5s ease forwards; opacity: 0; }
  .tips-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
  .tips-text { font-size: 12px; line-height: 1.8; color: #888; white-space: pre-line; }
  .error-box { background: #1a0a0a; border: 1px solid #440000; border-left: 3px solid #FF4444; padding: 14px; margin-bottom: 16px; border-radius: 2px; font-size: 12px; color: #FF8888; line-height: 1.6; display: none; }
  .error-box.visible { display: block; }
</style>
</head>
<body>
<header>
  <div class="logo">LENS<span>AI</span></div>
  <div class="version">FPV ADVISOR</div>
</header>
<div class="api-bar">
  <label>API Key</label>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" />
  <button class="save-btn" onclick="saveKey()">SAVE</button>
</div>
<div class="content">
  <div class="section-label">Camera System</div>
  <div class="camera-tabs">
    <button class="cam-tab active" onclick="selectCamera('avata2')" id="tab-avata2">Avata 2</button>
    <button class="cam-tab" onclick="selectCamera('mini4pro')" id="tab-mini4pro">Mini 4 Pro</button>
    <button class="cam-tab" onclick="selectCamera('gopro')" id="tab-gopro">GoPro</button>
  </div>
  <div class="log-row">
    <button class="log-pill active" onclick="selectLog('log')" id="log-log">D-Log M</button>
    <button class="log-pill" onclick="selectLog('normal')" id="log-normal">Normal</button>
  </div>
  <div class="section-label">Shoot Intent</div>
  <div class="intent-grid">
    <button class="intent-chip active" onclick="toggleIntent(this, 'FPV gaps fast flying')">FPV GAPS</button>
    <button class="intent-chip" onclick="toggleIntent(this, 'cinematic slow smooth')">CINEMATIC</button>
    <button class="intent-chip" onclick="toggleIntent(this, 'low light indoor')">LOW LIGHT</button>
    <button class="intent-chip" onclick="toggleIntent(this, 'bright outdoor sun')">BRIGHT SUN</button>
    <button class="intent-chip" onclick="toggleIntent(this, 'motion blur creative')">MOTION BLUR</button>
    <button class="intent-chip" onclick="toggleIntent(this, 'fast sport action')">SPORT</button>
  </div>
  <div class="section-label">Scene Photo</div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handlePhoto(event)" />
    <div class="upload-placeholder">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Take Photo</div>
      <div class="upload-sub">TAP TO OPEN CAMERA</div>
    </div>
    <img id="previewImg" alt="Scene preview" />
  </div>
  <button class="retake-btn" id="retakeBtn" onclick="retakePhoto()">↺ RETAKE PHOTO</button>
  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeScene()">⬡ ANALYZE SCENE</button>
  <div class="loading-bar" id="loadingBar"><div class="loading-fill"></div></div>
  <div class="error-box" id="errorBox"></div>
  <div class="results" id="results">
    <div class="result-grid">
      <div class="result-card" style="animation-delay:0.0s"><div class="result-key">ISO</div><div class="result-val hot" id="r-iso">—</div></div>
      <div class="result-card" style="animation-delay:0.05s"><div class="result-key">Shutter</div><div class="result-val" id="r-shutter">—</div></div>
      <div class="result-card" style="animation-delay:0.1s"><div class="result-key">White Balance</div><div class="result-val" id="r-wb">—</div></div>
      <div class="result-card" style="animation-delay:0.15s"><div class="result-key">ND Filter</div><div class="result-val hot" id="r-nd">—</div></div>
      <div class="result-card" style="animation-delay:0.2s"><div class="result-key">Color Profile</div><div class="result-val" id="r-color">—</div></div>
      <div class="result-card" style="animation-delay:0.25s"><div class="result-key">Resolution / FPS</div><div class="result-val" id="r-res">—</div></div>
      <div class="result-card full" style="animation-delay:0.3s"><div class="result-key">EIS / Stabilizer</div><div class="result-val" id="r-eis">—</div></div>
    </div>
    <div class="scene-box"><div class="scene-label">◈ Scene Read</div><div class="scene-text" id="sceneText"></div></div>
    <div class="tips-box"><div class="tips-label">▸ Operator Notes</div><div class="tips-text" id="tipsText"></div></div>
  </div>
</div>
<script>
  let selectedCamera = 'avata2', selectedLog = 'log', activeIntents = ['FPV gaps fast flying'], imageBase64 = null;
  let apiKey = localStorage.getItem('lens_api_key') || '';
  if (apiKey) document.getElementById('apiKeyInput').value = apiKey;

  function saveKey() {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!apiKey) return;
    localStorage.setItem('lens_api_key', apiKey);
    const btn = document.querySelector('.save-btn');
    btn.textContent = '✓'; setTimeout(() => btn.textContent = 'SAVE', 1500);
  }
  function selectCamera(cam) {
    selectedCamera = cam;
    document.querySelectorAll('.cam-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + cam).classList.add('active');
    document.getElementById('log-log').textContent = cam === 'gopro' ? 'GP-Log' : 'D-Log M';
    selectLog('log');
  }
  function selectLog(log) {
    selectedLog = log;
    document.querySelectorAll('.log-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('log-' + log).classList.add('active');
  }
  function toggleIntent(el, intent) {
    if (el.classList.contains('active')) {
      if (activeIntents.length === 1) return;
      el.classList.remove('active');
      activeIntents = activeIntents.filter(i => i !== intent);
    } else { el.classList.add('active'); activeIntents.push(intent); }
  }
  function handlePhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('uploadZone').classList.add('has-image');
      document.getElementById('retakeBtn').classList.add('visible');
      imageBase64 = e.target.result.split(',')[1];
    };
    reader.readAsDataURL(file);
  }
  function retakePhoto() {
    imageBase64 = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('uploadZone').classList.remove('has-image');
    document.getElementById('retakeBtn').classList.remove('visible');
    document.getElementById('fileInput').value = '';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('errorBox').classList.remove('visible');
  }
  async function analyzeScene() {
    if (!apiKey) { showError('Please enter your Anthropic API key and tap SAVE.'); return; }
    if (!imageBase64) { showError('Please take a photo of your scene first.'); return; }
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = 'ANALYZING...';
    document.getElementById('loadingBar').classList.add('visible');
    document.getElementById('results').classList.remove('visible');
    document.getElementById('errorBox').classList.remove('visible');
    const cameraNames = {
      avata2: 'DJI Avata 2 (1/1.7" sensor, f/2.8 fixed lens, D-Log M, RockSteady/HorizonSteady)',
      mini4pro: 'DJI Mini 4 Pro (1/1.3" sensor, f/1.7 aperture, D-Log M, 4K/100fps)',
      gopro: 'GoPro Hero 13 Black (1/1.9" sensor, GP-Log, HyperSmooth 6.0, 5.3K/60fps)'
    };
    const logLabel = selectedCamera === 'gopro' ? (selectedLog === 'log' ? 'GP-Log' : 'Standard Color') : (selectedLog === 'log' ? 'D-Log M' : 'Standard Color');
    const prompt = `You are an expert FPV drone and action camera operator with deep knowledge of exposure and color science.\n\nCamera: ${cameraNames[selectedCamera]}\nColor Profile: ${logLabel}\nShoot Intent: ${activeIntents.join(', ')}\n\nAnalyze this scene. Consider lighting, dynamic range, color temperature, and the 180-degree shutter rule.\n\nRespond ONLY with valid JSON, no markdown:\n{\n  "iso": "e.g. ISO 400",\n  "shutter": "e.g. 1/120s",\n  "white_balance": "e.g. 5600K",\n  "nd_filter": "e.g. ND16",\n  "color_profile": "exact profile name",\n  "resolution_fps": "e.g. 4K/60fps",\n  "eis": "stabilizer recommendation",\n  "scene_read": "2-3 sentence scene analysis",\n  "operator_notes": "4-5 specific tips for this scene and intent"\n}`;
    try {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey, imageBase64, prompt })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);
      showResults(result);
    } catch(err) {
      showError('Analysis failed: ' + (err.message || 'Check your API key.'));
    }
    btn.disabled = false; btn.textContent = '⬡ ANALYZE SCENE';
    document.getElementById('loadingBar').classList.remove('visible');
  }
  function showResults(r) {
    document.getElementById('r-iso').textContent = r.iso || '—';
    document.getElementById('r-shutter').textContent = r.shutter || '—';
    document.getElementById('r-wb').textContent = r.white_balance || '—';
    document.getElementById('r-nd').textContent = r.nd_filter || '—';
    document.getElementById('r-color').textContent = r.color_profile || '—';
    document.getElementById('r-res').textContent = r.resolution_fps || '—';
    document.getElementById('r-eis').textContent = r.eis || '—';
    document.getElementById('sceneText').textContent = r.scene_read || '';
    document.getElementById('tipsText').textContent = r.operator_notes || '';
    document.querySelectorAll('.result-card, .scene-box, .tips-box').forEach(el => {
      el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
    });
    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg; box.classList.add('visible');
  }
</script>
</body>
</html>
